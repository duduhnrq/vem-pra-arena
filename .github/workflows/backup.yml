name: Backup Automático do Banco

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Instalar Cliente PostgreSQL 17
      run: |
        sudo apt-get update
        sudo apt-get install -y curl ca-certificates lsb-release
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
        echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-client-17

    - name: Executar pg_dump e salvar arquivo
      run: |
        pg_dump '${{ secrets.SUPABASE_DB_URL }}' -w -F c -b -v -f backup_arena.dump

    - name: Fazer Upload do Backup como Artefato
      uses: actions/upload-artifact@v4
      with:
        name: backup-supabase
        path: backup_arena.dump
        retention-days: 7