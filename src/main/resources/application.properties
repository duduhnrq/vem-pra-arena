# ===============================================================
# Configuração Absoluta de Limite de Upload (100MB)
# ===============================================================
# Para versões do Spring Boot 2.x e 3.x modernas
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Segurança extra (Garante o mapeamento em versões específicas)
spring.http.multipart.max-file-size=100MB
spring.http.multipart.max-request-size=100MB

# Configurações adicionais para garantir que o upload funcione corretamente
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=false

server.tomcat.max-swallow-size=-1